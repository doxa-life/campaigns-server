openapi: 3.1.0
info:
  title: Prayer.Tools API
  description: Public API for accessing people group data and signing up for prayer reminders
  version: 1.0.0
  contact:
    name: Prayer.Tools Support

servers:
  - url: https://pray.doxa.life
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Admin
    description: Admin-only operations (require API key or JWT authentication)
  - name: Signups
    description: Prayer reminder signup operations
  - name: Profile
    description: Subscriber self-service profile and subscription management
  - name: People Groups
    description: Unreached people group data for WordPress themes and map widgets
  - name: App
    description: Mobile app support endpoints

paths:
  /api/app/version:
    get:
      tags:
        - App
      summary: Mobile app version gate
      description: |
        Returns the latest released app version, the minimum supported version
        (below which the app must force an update), and the platform store URLs.
        The mobile app calls this on launch/resume to decide whether to show an
        update banner (optional) or a blocking modal (forced).
      operationId: getAppVersion
      responses:
        '200':
          description: Current app version configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  latest_version:
                    type: string
                    description: Latest released version (semver)
                    example: "1.1.0"
                  min_supported_version:
                    type: string
                    description: Minimum supported version; below this the app forces an update
                    example: "1.0.0"
                  ios_app_store_url:
                    type: string
                    nullable: true
                    description: Deep link to the App Store listing (null if the iOS App Store id is unset)
                    example: "https://apps.apple.com/app/id1234567890"
                  android_play_url:
                    type: string
                    description: Deep link to the Google Play listing
                    example: "https://play.google.com/store/apps/details?id=app.prayer.doxa"
  /api/admin/people-groups/bulk-update:
    post:
      tags:
        - Admin
      summary: Bulk update people groups
      description: |
        Updates multiple people groups in a single request. Each item identifies a group by `id` or `slug`
        and provides fields to update. Partial success is supported — failures are reported per-item.
        Maximum 500 items per request. The `errors` array is capped at 50 entries.
      operationId: bulkUpdatePeopleGroups
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - updates
              properties:
                updates:
                  type: array
                  maxItems: 500
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: People group ID (provide id or slug, not both required)
                      slug:
                        type: string
                        description: People group slug (provide id or slug, not both required)
                      name:
                        type: string
                      image_url:
                        type: string
                        nullable: true
                      joshua_project_id:
                        type: string
                        nullable: true
                      metadata:
                        type: object
                        additionalProperties: true
                      country_code:
                        type: string
                        nullable: true
                      region:
                        type: string
                        nullable: true
                      latitude:
                        type: number
                        nullable: true
                      longitude:
                        type: number
                        nullable: true
                      population:
                        type: integer
                        nullable: true
                      evangelical_pct:
                        type: number
                        nullable: true
                      engagement_status:
                        type: string
                        nullable: true
                      primary_religion:
                        type: string
                        nullable: true
                      primary_language:
                        type: string
                        nullable: true
                      descriptions:
                        type: object
                        nullable: true
                        additionalProperties:
                          type: string
            example:
              updates:
                - slug: yao
                  joshua_project_id: "15988"
                - id: 42
                  population: 5000
                  region: africa
      responses:
        '200':
          description: Bulk update completed (may include partial failures)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Bulk update: 3 updated, 0 not found, 0 skipped, 0 errors"
                  stats:
                    type: object
                    properties:
                      total:
                        type: integer
                      updated:
                        type: integer
                      notFound:
                        type: integer
                      skipped:
                        type: integer
                      errors:
                        type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        identifier:
                          type: string
                        message:
                          type: string
        '400':
          description: Invalid request (empty array, exceeds 500 items, missing id/slug)
        '401':
          description: Unauthorized — missing or invalid API key / JWT

  /api/people-groups/{slug}/signup:
    post:
      tags:
        - Signups
      summary: Sign up for people group prayer reminders
      description: Creates a new subscription for prayer reminders for a specific people group
      operationId: signupForPeopleGroup
      parameters:
        - name: slug
          in: path
          required: true
          description: People group slug identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - delivery_method
                - frequency
                - reminder_time
              properties:
                name:
                  type: string
                  description: Subscriber name
                  example: John Doe
                email:
                  type: string
                  format: email
                  description: Email address (required for email delivery)
                  example: john@example.com
                phone:
                  type: string
                  description: Phone number (required for WhatsApp delivery)
                  example: "+1234567890"
                delivery_method:
                  type: string
                  enum: [email, whatsapp, app]
                  description: Delivery method for reminders
                  example: email
                frequency:
                  type: string
                  enum: [daily, weekly, custom]
                  description: Reminder frequency
                  example: daily
                days_of_week:
                  type: array
                  items:
                    type: string
                  description: Array of days for weekly frequency (required if frequency is weekly)
                  example: ["Monday", "Wednesday", "Friday"]
                reminder_time:
                  type: string
                  description: Preferred reminder time (HH:MM format)
                  example: "09:00"
      responses:
        '200':
          description: Successfully signed up
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  tracking_id:
                    type: string
                    description: Unique tracking ID for this subscription
                    example: abc123def456
                  message:
                    type: string
                    example: Successfully signed up for prayer reminders
        '400':
          description: Missing required fields, invalid delivery method, or people group not active
        '404':
          description: People group not found
        '500':
          description: Failed to create signup

  /api/people-groups/{slug}/anon-signup:
    post:
      tags:
        - Signups
      summary: Anonymous mobile-app prayer signup
      description: >
        Records a prayer signup for a people group from the mobile app without
        requiring contact information. Notifications are handled on-device; the
        server only records the schedule. Both `frequency` and `time` are
        optional — when omitted the signup is recorded as a daily 5-minute prayer
        commitment with no fixed reminder time. Upserts a single app subscription
        per (subscriber, people group) and returns a stable anonymous identity. An
        email may optionally be supplied to dedup against an existing subscriber
        and attach news consents.
      operationId: anonSignupForPeopleGroup
      security:
        - appSecret: []
      parameters:
        - name: slug
          in: path
          required: true
          description: People group slug identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tracking_id:
                  type: string
                  format: uuid
                  description: Persistent device identity; omit on first call, send the returned value afterwards
                frequency:
                  type: string
                  enum: [daily, weekly]
                  description: Optional; defaults to `daily` when omitted
                  example: daily
                time:
                  type: string
                  description: >
                    Optional reminder time, HH:MM (24h, local). When omitted the
                    signup has no fixed time (reminders are handled on-device) and
                    counts as a daily 5-minute prayer commitment.
                  example: "08:00"
                days_of_week:
                  type: array
                  items:
                    type: integer
                  description: Required when frequency is weekly. 0=Sunday .. 6=Saturday
                  example: [1, 3, 5]
                timezone:
                  type: string
                  description: IANA timezone (defaults to UTC if invalid/missing)
                  example: Europe/London
                language:
                  type: string
                  enum: [en, es, fr]
                  example: en
                email:
                  type: string
                  format: email
                  description: Optional; enables dedup against an existing subscriber and news consents
                name:
                  type: string
                  description: Optional; used only when an email is supplied
                consent_doxa_general:
                  type: boolean
                  description: Optional; only applied when an email is supplied
                consent_people_group_updates:
                  type: boolean
                  description: Optional; only applied when an email is supplied
      responses:
        '200':
          description: Signup recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  tracking_id:
                    type: string
                    format: uuid
                  profile_id:
                    type: string
                    format: uuid
                  subscription_id:
                    type: integer
        '400':
          description: Invalid fields (weekly without days_of_week, malformed time, invalid email)
        '403':
          description: Missing or invalid app secret
        '404':
          description: People group not found
        '500':
          description: Failed to create anonymous signup

  /api/news-signup:
    post:
      tags:
        - Signups
      summary: News / newsletter signup
      description: >
        Subscribes an email to news/marketing updates (and optionally
        people-group updates) with double opt-in verification. No prayer schedule
        required. Accepts either the mobile app secret (X-App-Secret) or the form
        API key (X-API-Key / Bearer). Email is the canonical identity, so this
        dedups against existing subscribers.
      operationId: newsSignup
      security:
        - appSecret: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: jane@example.com
                name:
                  type: string
                  example: Jane Doe
                consent_doxa_general:
                  type: boolean
                  description: Opt in to general Doxa updates
                consent_people_group_updates:
                  type: boolean
                  description: Opt in to updates for the people group named by people_group_slug
                people_group_slug:
                  type: string
                  description: Required to record people-group update consent
                country:
                  type: string
                  description: ISO alpha-2 or alpha-3 country code
                  example: GB
                language:
                  type: string
                  enum: [en, es, fr]
                tracking_id:
                  type: string
                  format: uuid
                  description: Optional; links the email to an existing anonymous subscriber
      responses:
        '200':
          description: News signup recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  tracking_id:
                    type: string
                    format: uuid
                  profile_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid email
        '403':
          description: Missing or invalid auth (app secret or form API key)
        '500':
          description: Failed to process news signup

  /api/people-groups/{slug}/prayer-content/{date}:
    get:
      tags:
        - Prayer
      summary: Get prayer content by date
      description: Returns prayer content for a specific date for a people group
      operationId: getPrayerContent
      parameters:
        - name: slug
          in: path
          required: true
          description: People group slug identifier
          schema:
            type: string
          example: 40-days-of-prayer
        - name: date
          in: path
          required: true
          description: Date in YYYY-MM-DD format
          schema:
            type: string
            format: date
          example: "2026-01-12"
        - name: language
          in: query
          required: false
          description: Language code (defaults to people group default language)
          schema:
            type: string
          example: en
      responses:
        '200':
          description: Successfully retrieved prayer content for the date
          content:
            application/json:
              schema:
                type: object
                properties:
                  people_group:
                    type: object
                    properties:
                      id:
                        type: integer
                      slug:
                        type: string
                      title:
                        type: string
                      default_language:
                        type: string
                  date:
                    type: string
                    format: date
                    description: The requested date (YYYY-MM-DD)
                  language:
                    type: string
                    description: Language code of the returned content
                  availableLanguages:
                    type: array
                    items:
                      type: string
                    description: Available languages for this date
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        language_code:
                          type: string
                        content_json:
                          type: object
                        content_date:
                          type: string
                          format: date
                        content_type:
                          type: string
                        people_group_data:
                          type: object
                          nullable: true
                    description: Array of prayer content items from all libraries
                  hasContent:
                    type: boolean
                    description: Whether any content was found for this date
                  metadata:
                    type: object
                    description: Additional metadata derived from the content
                    properties:
                      copyright_notices:
                        type: array
                        nullable: true
                        description: Scripture copyright/attribution notices for the Bible translations referenced in the content
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Translation identifier (e.g. ESV, NIV)
                            notice:
                              type: string
                              description: Copyright notice text to display
        '400':
          description: Invalid people group slug or date format
        '404':
          description: People group not found

  /api/people-groups/{slug}/prayer-content/{date}/session:
    post:
      tags:
        - Prayer
      summary: Record prayer session
      description: Records a prayer session for tracking and analytics
      operationId: recordPrayerSession
      parameters:
        - name: slug
          in: path
          required: true
          description: People group slug identifier
          schema:
            type: string
        - name: date
          in: path
          required: true
          description: Date of the prayer content (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2026-01-12"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - duration
                - timestamp
              properties:
                session_id:
                  type: string
                  description: Unique session identifier
                tracking_id:
                  type: string
                  nullable: true
                  description: User tracking ID (anonymous or authenticated)
                duration:
                  type: integer
                  description: Prayer duration in seconds
                timestamp:
                  type: string
                  format: date-time
                  description: Timestamp of the prayer session
                people_group_id:
                  type: integer
                  description: People group ID (optional; faster than slug lookup)
                track_event:
                  type: string
                  nullable: true
                  enum:
                    - prayer_auto_tracked
                    - prayer_logged
                  description: When set, also forwards the event to analytics
                language:
                  type: string
                  description: Locale code for the forwarded analytics event
                url:
                  type: string
                  description: Page path where the prayer occurred; forwarded as the analytics event URL
      responses:
        '200':
          description: Successfully recorded prayer session
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Missing required fields or invalid date format
        '404':
          description: People group not found
        '500':
          description: Failed to record prayer session

  /api/people-groups/list:
    get:
      tags:
        - People Groups
      summary: List all people groups
      description: |
        Returns all people groups with summary data and translated labels. Supports field selection and i18n.

        **Default fields:** id, name, slug, display_name, wagf_region, wagf_block, wagf_member, country, rop1, religion, location_description, population, has_photo, picture_url, people_praying, people_committed, adopted_by_churches
      operationId: listPeopleGroups
      parameters:
        - name: lang
          in: query
          required: false
          description: Language code for translated labels
          schema:
            type: string
            enum: [en, es, fr, pt, de, it, zh, ar, ru, hi]
            default: en
          example: en
        - name: fields
          in: query
          required: false
          description: |
            Comma-separated list of fields to return. Pass `all` to return every available field.

            **Available fields:** `name`, `slug`, `image_url`, `picture_credit`, `population`, `people_praying`, `people_committed`, `adopted_by_churches`, `joshua_project_id`, `status`, `reason_unlisted`, `imb_alternate_name`, `imb_people_description`, `location_description`, `doxa_wagf_uid`, `imb_uid`, `imb_pgid`, `imb_peid`, `country_code`, `region`, `imb_subregion`, `latitude`, `longitude`, `imb_is_indigenous`, `imb_population_class`, `evangelical_pct`, `imb_evangelical_level`, `engagement_status`, `reason_engaged`, `imb_congregation_existing`, `imb_church_planting`, `believers_count`, `imb_gsec`, `imb_strategic_priority_index`, `imb_lostness_priority_index`, `imb_affinity_code`, `primary_language`, `imb_language_family`, `imb_language_class`, `imb_language_speakers`, `religion`, `imb_reg_of_religion_3`, `imb_reg_of_religion_4`, `imb_reg_of_people_3`, `imb_reg_of_people_2`, `rop1`, `imb_reg_of_people_25`, `imb_bible_available`, `imb_jesus_film_available`, `imb_radio_broadcast_available`, `imb_gospel_recordings_available`, `imb_audio_scripture_available`, `imb_bible_stories_available`, `imb_total_resources_available`, `imb_bible_translation_level`, `imb_bible_year_published`, `workers_long_term`, `work_in_local_language`, `disciple_and_church_multiplication`, `wagf_region`, `wagf_block`, `wagf_member`, `has_photo`.
          schema:
            type: string
          example: id,name,country,population
      responses:
        '200':
          description: Successfully retrieved people groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/PeopleGroupSummary'
                  total:
                    type: integer
                    description: Total number of people groups

  /api/people-groups/detail/{slug}:
    get:
      tags:
        - People Groups
      summary: Get people group by slug
      description: Returns detailed information for a single people group with all fields, translated labels, and commitment statistics.
      operationId: getPeopleGroupBySlug
      parameters:
        - name: slug
          in: path
          required: true
          description: People group slug identifier
          schema:
            type: string
          example: shaikh-bangladesh
        - name: locale
          in: query
          required: false
          description: Language code for translated labels (also supports legacy 'lang' param and Accept-Language header)
          schema:
            type: string
            enum: [en, es, fr, pt, de, it, zh, ar, ru, hi]
            default: en
      responses:
        '200':
          description: Successfully retrieved people group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeopleGroupDetail'
        '400':
          description: Slug parameter is required
        '404':
          description: People group not found

  /api/people-groups/statistics:
    get:
      tags:
        - People Groups
      summary: Get prayer statistics
      description: Returns aggregate prayer and adoption statistics across all people groups.
      operationId: getPeopleGroupStatistics
      responses:
        '200':
          description: Successfully retrieved statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeopleGroupStatistics'

  /api/people-groups/highlighted:
    get:
      tags:
        - People Groups
      summary: Get featured people groups
      description: Returns the highest population people group per WAGF region. Excludes NA and Oceania regions. Only includes people groups with images.
      operationId: getHighlightedPeopleGroups
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of results (1-20)
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 6
        - name: lang
          in: query
          required: false
          description: Language code for translated labels
          schema:
            type: string
            enum: [en, es, fr, pt, de, it, zh, ar, ru, hi]
            default: en
      responses:
        '200':
          description: Successfully retrieved highlighted people groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/PeopleGroupSummary'
                  total:
                    type: integer

  /api/people-groups/{slug}/global-content:
    get:
      tags:
        - People Groups
      summary: Global prayer bundle for one people group
      description: >
        Returns a ready-to-render card-stack bundle for one people group (used
        by global.doxa.life): demographics, one random day from the group's
        day_in_life library, and a few random pieces drawn across the global
        shared libraries. Content is Tiptap JSON. Falls back to English when a
        locale row is missing.
      operationId: getPeopleGroupGlobalContent
      security:
        - FormApiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: query
          required: false
          schema:
            type: string
            default: en
      responses:
        '200':
          description: Prayer bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  demographics:
                    type: object
                    properties:
                      id: { type: integer }
                      slug: { type: string }
                      name: { type: string }
                      image_url: { type: string, nullable: true }
                      population: { type: integer, nullable: true }
                      evangelical_pct: { type: number, nullable: true }
                      far_from_jesus_pct: { type: number, nullable: true }
                      primary_religion: { type: string, nullable: true }
                      primary_language: { type: string, nullable: true }
                      region: { type: string, nullable: true }
                      country_code: { type: string, nullable: true }
                      description: { type: string, nullable: true }
                  day_in_life:
                    type: object
                    nullable: true
                    properties:
                      day_number: { type: integer }
                      content_json: { type: object, description: Tiptap document JSON }
                  pray_more:
                    type: array
                    items:
                      type: object
                      properties:
                        content_json: { type: object, description: Tiptap document JSON }
        '401':
          description: Invalid or missing API key
        '404':
          description: People group not found

  /api/profile/{id}:
    put:
      tags:
        - Profile
      summary: Update subscriber profile and a subscription
      description: >
        Updates a subscriber's profile and, optionally, one of their
        subscriptions. All fields are optional; only those present are changed.
        Identified by the subscriber's `profile_id` (UUID) in the path.


        Profile-level changes (name, email, consents) apply to the subscriber.
        Subscription-level changes require `subscription_id` and apply to that
        single subscription, which must belong to this profile.


        Passing `people_group_slug` alongside `subscription_id` moves that
        subscription to a different people group.
        If the subscriber already has a subscription for the target group using
        the same delivery method, the two are merged (the incoming schedule is
        applied to the existing row and the moved-from row is deleted) to avoid
        duplicate delivery. People-group email consent is not changed by a move;
        manage it explicitly with the `consent_people_group_*` fields.
      operationId: updateProfile
      parameters:
        - name: id
          in: path
          required: true
          description: Subscriber profile_id (UUID)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Subscriber name
                  example: John Doe
                email:
                  type: string
                  format: email
                  description: New email address (global; resets verification and re-sends the verification email)
                  example: john@example.com
                consent_doxa_general:
                  type: boolean
                  description: Consent to general Doxa updates
                consent_product_emails:
                  type: boolean
                  description: Consent to product emails
                consent_people_group_id:
                  type: integer
                  description: People group id to set update-consent for (use with consent_people_group_updates)
                consent_people_group_slug:
                  type: string
                  description: People group slug to set update-consent for (resolved server-side; alternative to consent_people_group_id)
                consent_people_group_updates:
                  type: boolean
                  description: Whether to grant (true) or revoke (false) update-consent for the given people group
                marketing_email_id:
                  type: integer
                  description: Marketing email id to attribute an opt-out to (sent by unsubscribe links)
                subscription_id:
                  type: integer
                  description: Id of the subscription to update (required for any subscription-level change)
                people_group_slug:
                  type: string
                  description: Move the subscription to this people group (slug; resolved server-side). Requires subscription_id.
                delivery_method:
                  type: string
                  enum: [email, whatsapp, app]
                  description: Subscription delivery method
                frequency:
                  type: string
                  enum: [daily, weekly]
                  description: Subscription reminder frequency
                days_of_week:
                  type: array
                  items:
                    type: integer
                  description: Days for weekly frequency. 0=Sunday .. 6=Saturday. Required (non-empty) when frequency is weekly.
                  example: [1, 3, 5]
                time_preference:
                  type: string
                  description: Preferred reminder time (HH:MM)
                  example: "09:00"
                timezone:
                  type: string
                  description: IANA timezone
                  example: Europe/London
                prayer_duration:
                  type: integer
                  description: Daily prayer commitment in minutes
                  example: 10
      responses:
        '200':
          description: Profile updated (and subscription updated when requested)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  email_changed:
                    type: boolean
                    example: false
                  subscriber:
                    type: object
                    properties:
                      id:
                        type: integer
                      profile_id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      email:
                        type: string
                      email_verified:
                        type: boolean
                  consents:
                    type: object
                    properties:
                      doxa_general:
                        type: boolean
                      product_emails:
                        type: boolean
                      people_group_ids:
                        type: array
                        items:
                          type: integer
                  currentSubscription:
                    type: object
                    description: Present only when a subscription was updated
                    properties:
                      id:
                        type: integer
                      delivery_method:
                        type: string
                        enum: [email, whatsapp, app]
                      frequency:
                        type: string
                      days_of_week:
                        type: array
                        items:
                          type: integer
                      time_preference:
                        type: string
                        nullable: true
                      timezone:
                        type: string
                      prayer_duration:
                        type: integer
                      status:
                        type: string
                        enum: [active, inactive, unsubscribed, pending]
        '400':
          description: Missing profile id, invalid name/email/frequency, or weekly without days
        '403':
          description: Subscription does not belong to this profile
        '404':
          description: Subscriber, subscription, or people group not found

  /api/collect/app:
    post:
      tags:
        - Analytics
      summary: Mobile-app analytics relay
      description: >
        First-party analytics relay for the mobile app. The app POSTs usage
        events here and the server forwards them to the analytics backend
        server-side (keeping the analytics API key off the client). Mirrors the
        browser relay (`/api/collect`) but authenticates with the bundled app
        secret (`X-App-Secret`) instead of a same-origin check, since a native
        app sends no matching Origin. Identity travels as the device's
        `anonymous_hash` (the `tracking_id` returned by anon-signup). A raw email
        is never accepted; any `user_hash` must arrive pre-hashed. All events are
        recorded fire-and-forget and the endpoint returns immediately.
      operationId: collectAppEvent
      security:
        - appSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - event_type
              properties:
                event_type:
                  type: string
                  enum: [app_open, language_switched]
                  description: Allowlisted app event type
                anonymous_hash:
                  type: string
                  maxLength: 128
                  description: Device identity — the tracking_id returned by anon-signup
                user_hash:
                  type: string
                  maxLength: 128
                  description: Optional pre-hashed user identity (sha256 of lowercased email)
                language:
                  type: string
                  maxLength: 32
                  example: en
                value:
                  type: number
                  nullable: true
                  description: Optional numeric value for the event
                url:
                  type: string
                  maxLength: 2048
                screen_size:
                  type: string
                  maxLength: 32
                  example: "390x844"
                metadata:
                  type: object
                  additionalProperties: true
                  description: >
                    Optional event metadata (max 8KB; PII keys are stripped
                    server-side). For app_open, e.g. platform, app_version,
                    people_group_slug.
      responses:
        '202':
          description: Event accepted for recording
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Invalid body, invalid JSON, or unsupported event_type
        '403':
          description: Missing or invalid app secret
        '413':
          description: Metadata payload too large

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: API key for admin endpoints
    appSecret:
      type: apiKey
      in: header
      name: x-app-secret
      description: Shared secret bundled into the mobile app (anonymous + news signup)
    FormApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Shared form API key (FORM_API_KEY) for trusted sister sites (marketing, global)

  schemas:
    ValueLabel:
      type: object
      description: A value with its translated label
      properties:
        value:
          type: string
          description: The raw value
        label:
          type: string
          description: Human-readable translated label

    PeopleGroupSummary:
      type: object
      description: Summary data for a people group
      properties:
        id:
          type: string
          description: People group slug identifier
          example: "shaikh-bangladesh"
        name:
          type: string
          description: People group name
          example: "Shaikh"
        slug:
          type: string
          description: URL-friendly identifier
          example: "shaikh-bangladesh"
        display_name:
          type: string
          description: Display name
          example: "Shaikh of Bangladesh"
        wagf_region:
          $ref: '#/components/schemas/ValueLabel'
        wagf_block:
          $ref: '#/components/schemas/ValueLabel'
        wagf_member:
          $ref: '#/components/schemas/ValueLabel'
        country:
          $ref: '#/components/schemas/ValueLabel'
        rop1:
          $ref: '#/components/schemas/ValueLabel'
        religion:
          $ref: '#/components/schemas/ValueLabel'
        location_description:
          type: string
          nullable: true
        population:
          type: integer
          nullable: true
          example: 123456
        has_photo:
          type: boolean
        picture_url:
          type: string
          nullable: true
          format: uri
        picture_credit:
          type: array
          nullable: true
          items:
            type: object
            properties:
              text:
                type: string
              link:
                type: string
                nullable: true
        people_praying:
          type: integer
          description: Number of people currently praying for this group
          example: 42
        people_committed:
          type: integer
          description: Total number of active prayer commitments (subscriptions)
          example: 58
        adopted_by_churches:
          type: integer
          description: Number of churches that have adopted this group (always 0)
          example: 0

    PeopleGroupDetail:
      type: object
      description: Full detail for a people group with all fields and commitment stats
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        display_name:
          type: string
        image_url:
          type: string
          nullable: true
          format: uri
        picture_credit:
          type: array
          nullable: true
          items:
            type: object
            properties:
              text:
                type: string
              link:
                type: string
                nullable: true
        population:
          type: integer
          nullable: true
        people_praying:
          type: integer
        adopted_by_churches:
          type: integer
        people_committed:
          type: integer
          description: Total number of active prayer commitments
        committed_duration:
          type: integer
          description: >
            Frequency-weighted daily committed prayer minutes across active
            subscriptions. Weekly commitments are scaled by days-per-week ÷ 7, so
            the figure reflects average minutes committed per day.
        global_start_date:
          type: string
          format: date
          nullable: true
          description: Global start date (YYYY-MM-DD)
        imb_display_name:
          type: string
          nullable: true
        imb_alternate_name:
          type: string
          nullable: true
        imb_people_name:
          type: string
          nullable: true
        imb_people_description:
          type: string
          nullable: true
          description: Generated description from template interpolation
        imb_location_description:
          type: string
          nullable: true
        country_code:
          $ref: '#/components/schemas/ValueLabel'
        region:
          $ref: '#/components/schemas/ValueLabel'
        imb_subregion:
          $ref: '#/components/schemas/ValueLabel'
        latitude:
          type: string
          nullable: true
        longitude:
          type: string
          nullable: true
        engagement_status:
          $ref: '#/components/schemas/ValueLabel'
        primary_religion:
          $ref: '#/components/schemas/ValueLabel'
        primary_language:
          $ref: '#/components/schemas/ValueLabel'
        imb_reg_of_religion_3:
          $ref: '#/components/schemas/ValueLabel'
        imb_reg_of_people_1:
          $ref: '#/components/schemas/ValueLabel'
        doxa_wagf_region:
          $ref: '#/components/schemas/ValueLabel'
        doxa_wagf_block:
          $ref: '#/components/schemas/ValueLabel'
      additionalProperties: true

    PeopleGroupStatistics:
      type: object
      description: Aggregate prayer statistics
      properties:
        total_with_prayer:
          type: integer
          description: Number of people groups with at least one person praying (tracked prayer activity in the last 7 days)
          example: 234
        total_with_full_prayer:
          type: integer
          description: >
            Number of people groups whose frequency-weighted daily committed
            minutes sum to 1440+ (full 24-hour daily coverage). Weekly
            commitments count as days-per-week ÷ 7 of their duration.
          example: 45
        total_with_prayer_committed:
          type: integer
          description: Number of people groups with at least one active prayer commitment (campaign subscription)
          example: 312
        total_adopted:
          type: integer
          description: Number of people groups adopted by churches (always 0)
          example: 0
        people_committed:
          type: integer
          description: Total number of active prayer commitments (subscriptions)
          example: 1200
        committed_duration:
          type: integer
          description: >
            Frequency-weighted daily committed prayer minutes across all active
            subscriptions (weekly commitments scaled by days-per-week ÷ 7).
          example: 36000
