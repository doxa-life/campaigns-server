name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun run test:unit

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright-core install --with-deps chromium

      - name: Run migrations
        run: bun run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Run e2e tests
        # vitest's default reporter uses carriage returns that GH Actions' log
        # collector strips, so test names + assertion failures never appear in
        # the log. The JSON reporter writes a structured file we dump on
        # failure; the verbose reporter gives line-by-line progress in the log.
        run: bunx vitest run --config vitest.config.ts --reporter=verbose --reporter=json --outputFile=/tmp/vitest-e2e.json
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET: test-jwt-secret-for-ci

      - name: Print failing tests
        if: failure()
        run: |
          if [ ! -f /tmp/vitest-e2e.json ]; then
            echo "No vitest JSON output found"
            exit 0
          fi
          echo "::group::Test summary"
          python3 -c "
          import json
          with open('/tmp/vitest-e2e.json') as f:
              d = json.load(f)
          print(f\"totals: {d.get('numTotalTests')} | passed: {d.get('numPassedTests')} | failed: {d.get('numFailedTests')} | files: {d.get('numTotalTestSuites')}\")
          print()
          print('--- File-level status (only non-passed) ---')
          for fr in d.get('testResults', []):
              status = fr.get('status') or fr.get('result', {}).get('status')
              if status not in ('passed', 'success'):
                  print(f\"FILE: {fr.get('name')}  status={status}\")
                  msg = fr.get('message') or ''
                  if msg:
                      print(msg[:2000])
                  print()
          print('--- Failed assertions ---')
          for fr in d.get('testResults', []):
              for t in fr.get('assertionResults', []):
                  if t.get('status') == 'failed':
                      print()
                      print('FAIL:', t.get('fullName'))
                      for m in t.get('failureMessages', [])[:1]:
                          print(m[:2000])
          "
          echo "::endgroup::"

      - name: Upload vitest results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-e2e-results
          path: /tmp/vitest-e2e.json
          if-no-files-found: ignore

  all-tests:
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "Tests failed: unit=${{ needs.unit.result }}, e2e=${{ needs.e2e.result }}"
            exit 1
          fi
          echo "All tests passed"
